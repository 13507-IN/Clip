version: "3.8"

services:
  urlshortener:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LISTEN_ADDR=:8080
      - BASE_URL=http://localhost:8080
      - DB_PATH=/data/urlshortener.db
      - RUST_LOG=info
    volumes:
      - urlshortener_data:/data
    restart: unless-stopped

volumes:
  urlshortener_data:
